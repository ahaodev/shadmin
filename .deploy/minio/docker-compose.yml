services:
  shadmin:
    image: ghcr.io/ahaodev/shadmin:latest
    container_name: shadmin
    restart: unless-stopped
    ports:
      - "55667:55667"
    environment:
      - APP_ENV=production
      - DB_TYPE=postgres
      - DB_DSN=postgres://shadmin:shadmin@postgres:5432/shadmin?sslmode=disable
      - ACCESS_TOKEN_SECRET=change-me-to-a-secure-secret-1
      - REFRESH_TOKEN_SECRET=change-me-to-a-secure-secret-2
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=abc123
      - ADMIN_EMAIL=admin@example.com
      - STORAGE_TYPE=minio
      - S3_ADDRESS=minio:9000
      - S3_ACCESS_KEY=IjJm2N3ZZTYjt8C9WkJf
      - S3_SECRET_KEY=eIuV0i4ChbLqx54g9rhsZDRTC2LE1xEcnIAnAw1C
      - S3_BUCKET=shadmin
      - S3_TOKEN=
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:18.3
    container_name: shadmin-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=shadmin
      - POSTGRES_USER=shadmin
      - POSTGRES_PASSWORD=shadmin
      - PGDATA=/data/postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadmin"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: unless-stopped
    command: server /bitnami/minio/data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=Abcd.123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/bitnami/minio/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  minio-data:
